services:
  postgres:
    image: postgres:16-alpine
    container_name: flowtask-postgres
    environment:
      POSTGRES_USER: flowtask
      POSTGRES_PASSWORD: flowtask
      POSTGRES_DB: flowtask
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowtask"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowtask-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: flowtask-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
